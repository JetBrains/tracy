name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      record_openai_fixtures:
        description: 'Record OpenAI fixtures against a real provider (requires OPENAI_API_KEY secret)'
        required: false
        default: 'false'
        type: boolean

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (mock mode, skip live LLM providers)
        run: ./gradlew allTests -DtracyLocalTests=false -Dskip.llm.providers=openai,gemini,anthropic

  record-openai-fixtures:
    name: Record OpenAI fixtures
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.record_openai_fixtures == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Record OpenAI fixtures
        run: ./gradlew :tracing:openai:recordOpenAIFixtures
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit recorded fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracing/openai/src/jvmTest/resources/fixtures/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: record OpenAI test fixtures [skip ci]"
          git push
