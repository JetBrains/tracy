name: Comment Build Instructions on PR

on:
  pull_request:
    types: [opened]

jobs:
  comment-build-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Comment on the PR with Build Instructions
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .github/workflows/BUILD_INSTRUCTIONS.md
